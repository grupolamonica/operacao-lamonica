name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/grupolamonica/torre-backend
  FRONTEND_IMAGE: ghcr.io/grupolamonica/torre-frontend

jobs:
  # ── Gate: lint + typecheck + build must pass before any image is built ──────
  test:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: torre-de-controle/package-lock.json

      # Backend — typecheck (Bun)
      - name: Backend install
        run: cd api && bun install --frozen-lockfile
      - name: Backend typecheck
        run: cd api && bun --bun tsc --noEmit

      # Frontend — lint + typecheck + build
      - name: Frontend install
        run: cd torre-de-controle && npm ci
      - name: Frontend lint
        run: cd torre-de-controle && npm run lint --if-present
      - name: Frontend typecheck + build
        env:
          VITE_API_URL: https://torre.grupolamonica.com
        run: cd torre-de-controle && npm run build

  # ── Build backend image (Bun/Elysia) → GHCR ─────────────────────────────────
  build-backend:
    name: Build Backend Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build frontend image (Vite → nginx) → GHCR ──────────────────────────────
  build-frontend:
    name: Build Frontend Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./torre-de-controle
          file: ./torre-de-controle/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # VITE_* are baked into the bundle at build time (same-origin single domain)
          build-args: |
            VITE_API_URL=https://torre.grupolamonica.com
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=torre-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS (ship compose files via scp, pull GHCR images, compose up) ─
  # No git on the VPS (org disables deploy keys) — compose files are copied from
  # the Actions runner. Secrets live in /opt/apps/torre/.env (provisioned once).
  deploy-vps:
    name: Deploy VPS
    needs: [build-backend, build-frontend]
    # Phase 12 — runner self-hosted NA VPS: deploy roda local (cp + docker compose),
    # sem scp/ssh de IP dinâmico → elimina o fail2ban que travava os deploys.
    runs-on: [self-hosted, torre]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy + smoke test (local, na VPS)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          GIT_SHA: ${{ github.sha }}
          ANGELLIRA_USER: ${{ secrets.ANGELLIRA_USER }}
          ANGELLIRA_PASS: ${{ secrets.ANGELLIRA_PASS }}
          ANGELLIRA_EMPRESA: ${{ secrets.ANGELLIRA_EMPRESA }}
          # Phase 14 — cutover Cargas p/ PRODUÇÃO (leitura Supabase + creds do operador p/ escrita futura)
          CARGAS_SUPABASE_URL: ${{ secrets.CARGAS_SUPABASE_URL }}
          CARGAS_SUPABASE_KEY: ${{ secrets.CARGAS_SUPABASE_KEY }}
          CARGAS_API_URL: ${{ secrets.CARGAS_API_URL }}
          CARGAS_OPERATOR_EMAIL: ${{ secrets.CARGAS_OPERATOR_EMAIL }}
          CARGAS_OPERATOR_PASSWORD: ${{ secrets.CARGAS_OPERATOR_PASSWORD }}
          # Phase 15 — API key do endpoint GET /api/spx/asp (consumo máquina-a-máquina)
          SPX_ASP_API_KEY: ${{ secrets.SPX_ASP_API_KEY }}
          # API de integração — GET /api/integrations/drivers/:cpf (consumo máquina-a-máquina)
          INTEGRATION_API_KEY: ${{ secrets.INTEGRATION_API_KEY }}
        run: |
          set -euo pipefail
          # Compose files vêm do checkout do runner; copia p/ o diretório de deploy
          cp docker-compose.prod.yml docker-compose.domain.yml /opt/apps/torre/
          cd /opt/apps/torre

          # Phase 12/14 — garante credenciais no .env (upsert idempotente).
          # CARGAS_WRITE_ENABLED fixo em false: produção só LÊ do Cargas até autorização explícita de escrita.
          touch .env
          for kv in "ANGELLIRA_USER=${ANGELLIRA_USER}" "ANGELLIRA_PASS=${ANGELLIRA_PASS}" "ANGELLIRA_EMPRESA=${ANGELLIRA_EMPRESA}" \
                    "CARGAS_SUPABASE_URL=${CARGAS_SUPABASE_URL}" "CARGAS_SUPABASE_KEY=${CARGAS_SUPABASE_KEY}" \
                    "CARGAS_API_URL=${CARGAS_API_URL}" "CARGAS_OPERATOR_EMAIL=${CARGAS_OPERATOR_EMAIL}" \
                    "CARGAS_OPERATOR_PASSWORD=${CARGAS_OPERATOR_PASSWORD}" "CARGAS_WRITE_ENABLED=false" \
                    "SPX_ASP_API_KEY=${SPX_ASP_API_KEY}" \
                    "INTEGRATION_API_KEY=${INTEGRATION_API_KEY}"; do
            key="${kv%%=*}"
            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${kv}|" .env
            else
              echo "$kv" >> .env
            fi
          done

          # GHCR auth (token válido durante o job)
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

          docker pull "ghcr.io/grupolamonica/torre-backend:sha-${GIT_SHA}"
          docker pull "ghcr.io/grupolamonica/torre-frontend:sha-${GIT_SHA}"

          cat > docker-compose.deploy.yml <<EOF
          services:
            backend:
              image: ghcr.io/grupolamonica/torre-backend:sha-${GIT_SHA}
            frontend:
              image: ghcr.io/grupolamonica/torre-frontend:sha-${GIT_SHA}
          EOF

          docker compose \
            -f docker-compose.prod.yml \
            -f docker-compose.domain.yml \
            -f docker-compose.deploy.yml \
            up -d --remove-orphans --force-recreate

          echo "Waiting for backend health..."
          ok=0
          for i in $(seq 1 20); do
            if docker exec torre-backend bun -e "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" >/dev/null 2>&1; then
              echo "Backend healthy."; ok=1; break
            fi
            sleep 3
          done
          if [ "$ok" != "1" ]; then echo "Backend did not become healthy"; docker logs torre-backend --tail 60; exit 1; fi

          docker image prune -f >/dev/null 2>&1 || true
          echo "Deploy complete: ${GIT_SHA}"
