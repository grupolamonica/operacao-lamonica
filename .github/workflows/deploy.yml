name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/grupolamonica/torre-backend
  FRONTEND_IMAGE: ghcr.io/grupolamonica/torre-frontend

jobs:
  # ── Gate: lint + typecheck + build must pass before any image is built ──────
  test:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: torre-de-controle/package-lock.json

      # Backend — typecheck (Bun)
      - name: Backend install
        run: cd api && bun install --frozen-lockfile
      - name: Backend typecheck
        run: cd api && bun --bun tsc --noEmit

      # Frontend — lint + typecheck + build
      - name: Frontend install
        run: cd torre-de-controle && npm ci
      - name: Frontend lint
        run: cd torre-de-controle && npm run lint --if-present
      - name: Frontend typecheck + build
        env:
          VITE_API_URL: https://torre.grupolamonica.com
        run: cd torre-de-controle && npm run build

  # ── Build backend image (Bun/Elysia) → GHCR ─────────────────────────────────
  build-backend:
    name: Build Backend Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build frontend image (Vite → nginx) → GHCR ──────────────────────────────
  build-frontend:
    name: Build Frontend Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./torre-de-controle
          file: ./torre-de-controle/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # VITE_* are baked into the bundle at build time (same-origin single domain)
          build-args: |
            VITE_API_URL=https://torre.grupolamonica.com
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=torre-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS via SSH (pull GHCR images, compose up, smoke test) ─────────
  deploy-vps:
    name: Deploy VPS
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy + smoke test via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/apps/torre

            # Sync repo config (compose files, Dockerfiles) to this commit
            git fetch origin main
            git reset --hard origin/main

            # Authenticate with GHCR (token valid for the duration of this job)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull SHA-pinned images
            docker pull ghcr.io/grupolamonica/torre-backend:sha-${{ github.sha }}
            docker pull ghcr.io/grupolamonica/torre-frontend:sha-${{ github.sha }}

            # Pin exact SHA tags via deploy override
            cat > docker-compose.deploy.yml << EOF
            services:
              backend:
                image: ghcr.io/grupolamonica/torre-backend:sha-${{ github.sha }}
              frontend:
                image: ghcr.io/grupolamonica/torre-frontend:sha-${{ github.sha }}
            EOF

            # Bring up the stack (env from /opt/apps/torre/.env, DOMAIN included there)
            docker compose \
              -f docker-compose.prod.yml \
              -f docker-compose.domain.yml \
              -f docker-compose.deploy.yml \
              up -d --remove-orphans

            # Smoke test — wait for backend health (max ~60s)
            echo "Waiting for backend health..."
            for i in $(seq 1 20); do
              if docker exec torre-backend wget -qO- http://localhost:3000/health >/dev/null 2>&1; then
                echo "Backend healthy."
                break
              fi
              if [ "$i" = "20" ]; then echo "Backend did not become healthy"; docker logs torre-backend --tail 50; exit 1; fi
              sleep 3
            done

            # Prune dangling images to reclaim disk
            docker image prune -f >/dev/null 2>&1 || true
            echo "Deploy complete: ${{ github.sha }}"
