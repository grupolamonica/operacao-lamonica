name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'torre-de-controle/**'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    # D-28: do NOT block merge on Lighthouse failure — perf budget is informational
    # for MVP. Warn-only signal; engineer reviews scores manually.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: torre-de-controle/package-lock.json
      - run: cd torre-de-controle && npm ci
      - run: cd torre-de-controle && npm run build
      - run: npm install -g @lhci/cli@0.15.x
      # Lighthouse on /login only — dashboard/insights require auth.
      # Future: scripted login via Puppeteer (RESEARCH Open Question #7).
      - name: Run Lighthouse CI on /login (no auth)
        run: cd torre-de-controle && lhci autorun --collect.staticDistDir=dist --collect.url=http://localhost/login --upload.target=temporary-public-storage
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
