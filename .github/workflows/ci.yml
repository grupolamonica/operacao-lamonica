name: CI

on:
  pull_request:
    branches: [main]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'api/**'
            frontend:
              - 'torre-de-controle/**'

  backend:
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install
        run: cd api && bun install --frozen-lockfile
      - name: Typecheck
        run: cd api && bun --bun tsc --noEmit
      - name: Backend image builds
        run: docker build -f api/Dockerfile -t torre-backend:ci ./api

  frontend:
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: torre-de-controle/package-lock.json
      - name: Install
        run: cd torre-de-controle && npm ci
      - name: Lint
        run: cd torre-de-controle && npm run lint --if-present
      - name: Typecheck + build
        env:
          VITE_API_URL: https://torre.grupolamonica.com
        run: cd torre-de-controle && npm run build

# NOTE: Database schema is NOT pushed from CI. The Drizzle schema does not manage
# the PostGIS `geom` column (see api/drizzle/postgis-manual.sql), so `drizzle-kit
# push` would propose destructive drops. Schema changes go through
# `drizzle-kit generate` (reviewed SQL) applied manually against DATABASE_URL_DIRECT.
