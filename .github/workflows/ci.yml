name: CI

on:
  pull_request:
    branches: [main]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'api/**'
              - 'railway.json'
            frontend:
              - 'torre-de-controle/**'

  backend:
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install
        run: cd api && bun install --frozen-lockfile
      - name: Typecheck
        run: cd api && bunx tsc --noEmit
      # Drizzle schema preview — does NOT apply; just inspects diff.
      # --strict + --verbose + --dry-run prints the SQL diff against DATABASE_URL_PROD
      # without executing. Pitfall #1: NEVER --force.
      - name: Drizzle schema preview (dry run)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: cd api && bunx drizzle-kit push --strict --verbose --dry-run

  frontend:
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: torre-de-controle/package-lock.json
      - name: Install
        run: cd torre-de-controle && npm ci
      - name: Lint
        run: cd torre-de-controle && npm run lint
      - name: Build
        run: cd torre-de-controle && npm run build
