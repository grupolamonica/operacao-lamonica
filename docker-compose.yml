services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: torre-postgres
    environment:
      POSTGRES_DB: torre_controle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d torre_controle"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: torre-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: torre-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres.ocgifdytaqlubuokjkwv:dphLG3kL1BqG4kwa@aws-1-sa-east-1.pooler.supabase.com:6543/postgres}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-please-make-this-very-long-and-random-64-bytes-hex}
      JWT_EXPIRES_IN: 24h
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules

volumes:
  pgdata:
